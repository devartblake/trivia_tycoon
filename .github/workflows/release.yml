name: Release v4.0.0

on:
  workflow_dispatch:
    inputs:
      target_platform:
        description: 'Target platform(s) for release'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - web
          - windows

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage

  build_android:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: code_quality
    if: github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'android'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v3
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_web:
    name: Build Web Release
    runs-on: ubuntu-latest
    needs: code_quality
    if: github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'web'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build web --release

  build_windows:
    name: Build Windows Release
    runs-on: windows-latest
    needs: code_quality
    if: github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'windows'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
